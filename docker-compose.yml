services:
  db:
    image: postgres:15
    container_name: macaco_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: macaco_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d macaco_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: macaco_api
    ports:
      - "3000:3000"           # for frontend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_NAME=macaco_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "npm run build && npx ts-node src/sync.ts && npx ts-node src/seed.ts && node dist/index.js"

volumes:
  postgres_data: